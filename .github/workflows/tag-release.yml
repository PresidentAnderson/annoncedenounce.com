name: Tag Release

# Tags the version on main once a release bump is merged. Idempotent: it only acts
# when package.json's version has no matching tag yet, so ordinary merges are no-ops.
on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "version.json"

concurrency:
  group: tag-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: Tag and release if version is new
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and release
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "Automated release $TAG" || echo "::warning::release creation failed; tag was pushed"
