name: Auto Version Bump

# Branch protection blocks direct pushes to main, so this no longer pushes to main.
# It opens a release PR instead. For FULL automation (CI runs on the PR + auto-merge),
# add a repo secret RELEASE_TOKEN (a fine-grained PAT with contents:write + pull-requests:write);
# PRs opened with the default GITHUB_TOKEN do NOT trigger the CI check, so without
# RELEASE_TOKEN the release PR opens but must be merged manually by an admin.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semantic version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: auto-version-bump
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Open release bump PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      BUMP: ${{ inputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply version bump
        run: npm run version:bump -- "$BUMP"

      - name: Verify bumped release
        run: npm run verify

      - name: Read next version
        id: release
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Open release PR
        env:
          NEXT: ${{ steps.release.outputs.version }}
          HAS_PAT: ${{ secrets.RELEASE_TOKEN != '' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/v${NEXT}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json version.json index.html
          git commit -m "chore(release): v${NEXT}"
          git push -u origin "$BRANCH"

          gh label create release --color FFD166 --description "Automated release bump" 2>/dev/null || true
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore(release): v${NEXT}" \
            --body "Automated version bump to v${NEXT} (\`${BUMP}\`). On merge, the Tag Release workflow tags v${NEXT}." \
            --label "release")
          echo "Opened $PR_URL"

          if [ "$HAS_PAT" = "true" ]; then
            gh pr merge "$PR_URL" --auto --merge --delete-branch || echo "::warning::could not enable auto-merge; merge the release PR manually"
          else
            echo "::notice::No RELEASE_TOKEN secret set — CI will not run on a GITHUB_TOKEN-created PR, so auto-merge is skipped. An admin should merge ${PR_URL} manually."
          fi

      - name: Summary
        if: always()
        env:
          NEXT: ${{ steps.release.outputs.version }}
        run: |
          {
            echo "### Release PR opened for v${NEXT}"
            echo ""
            echo "It auto-merges once the CI verify check passes; the Tag Release workflow then tags v${NEXT} and creates a GitHub Release."
          } >> "$GITHUB_STEP_SUMMARY"
