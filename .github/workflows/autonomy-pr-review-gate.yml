name: Autonomy PR Review Gate

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: ["main", "master"]

concurrency:
  group: pr-review-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  review-gate:
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Untrusted PR-controlled fields are passed via env and never interpolated
      # directly into run scripts (prevents shell/script injection).
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      BRANCH_NAME: ${{ github.head_ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate agent PR
        run: |
          set -euo pipefail
          echo "🔍 Validating autonomous agent PR..."
          ERRORS=()

          if ! [[ "$BRANCH_NAME" =~ ^agent/(codex|claude|copilot|sparks)/[0-9]+-[a-z0-9-]+$ ]]; then
            ERRORS+=("❌ Invalid branch name format. Expected: agent/{agent_name}/{issue_number}-{slug}")
          fi
          if ! printf '%s' "$PR_BODY" | grep -q "Agent Handoff Protocol"; then
            ERRORS+=("❌ Missing Agent Handoff Protocol section")
          fi
          if ! printf '%s' "$PR_BODY" | grep -q "@claude-code"; then
            ERRORS+=("❌ Missing @claude-code handoff mention")
          fi
          if ! printf '%s' "$PR_BODY" | grep -q "Closes #[0-9]"; then
            ERRORS+=("❌ Missing 'Closes #issue' reference")
          fi
          if ! printf '%s' "$PR_BODY" | grep -q "Review Checklist"; then
            ERRORS+=("❌ Missing Review Checklist")
          fi
          ISSUE_NUM=$(printf '%s' "$BRANCH_NAME" | grep -o '/[0-9]\+' | cut -d'/' -f2 || echo "")
          if [ -n "$ISSUE_NUM" ] && [ ! -f "IMPLEMENTATION_$ISSUE_NUM.md" ]; then
            ERRORS+=("❌ Missing implementation file: IMPLEMENTATION_$ISSUE_NUM.md")
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            {
              echo "## 🚫 Autonomous PR Validation Failed"
              echo ""
              printf '%s\n' "${ERRORS[@]}"
            } > comment.md
            gh pr comment "$PR_NUMBER" --body-file comment.md
            exit 1
          fi

          echo "✅ PR validation passed"
          printf '## ✅ Autonomous PR Validation Passed\n\nReady for human review and merge approval.\n' > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md
          gh pr edit "$PR_NUMBER" --add-label "agent:validated"

      - name: Request human review
        if: success()
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --add-label "review:claude-required"

  security-scan:
    if: startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_REF: ${{ github.base_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security scan for autonomous changes
        run: |
          set -euo pipefail
          echo "🔒 Scanning autonomous changes..."
          git fetch origin "$BASE_REF" --depth=0 || git fetch origin "$BASE_REF" || true
          DIFF=$(git diff "origin/$BASE_REF...HEAD" || git diff "HEAD~1...HEAD" || echo "")
          SECURITY_ISSUES=()

          if printf '%s' "$DIFF" | grep -iE "(password|secret|api[_-]?key|token)" | grep -v "GITHUB_TOKEN" | grep -q .; then
            SECURITY_ISSUES+=("⚠️ Potential hardcoded credentials detected")
          fi
          if printf '%s' "$DIFF" | grep -E "(rm -rf|sudo |curl.*\| *sh|eval |exec )" | grep -q .; then
            SECURITY_ISSUES+=("⚠️ Potentially dangerous commands detected")
          fi

          if [ ${#SECURITY_ISSUES[@]} -gt 0 ]; then
            {
              echo "## 🚨 Security Scan Alert"
              echo ""
              printf '%s\n' "${SECURITY_ISSUES[@]}"
              echo ""
              echo "Manual security review required before merge."
            } > scan.md
            gh pr comment "$PR_NUMBER" --body-file scan.md
            gh pr edit "$PR_NUMBER" --add-label "security:review-required"
          else
            echo "✅ Security scan passed"
            gh pr edit "$PR_NUMBER" --add-label "security:cleared"
          fi
