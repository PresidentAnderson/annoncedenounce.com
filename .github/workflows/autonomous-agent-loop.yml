name: Autonomous Agent Execution Loop

# Manual-only. The previous issue/PR auto-triggers were removed: on a public repo they
# let activity drive a write-access agent loop and (via the old session-summary step)
# push straight to main, triggering production deploys. Run this deliberately instead.
on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'Agent to execute'
        required: true
        default: 'codex'
        type: choice
        options:
          - codex
          - claude
          - copilot
          - sparks
      max_issues:
        description: 'Maximum issues to process (1-10)'
        required: false
        default: '1'
        type: string
      allow_continuous:
        description: 'Allow unlimited processing (24/7 mode)'
        required: false
        default: false
        type: boolean

concurrency:
  group: autonomous-agent-loop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  autonomous-execution:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # agent_name is a constrained choice input; max_issues/allow_continuous are passed
      # via env (never interpolated inline into run scripts) to prevent shell injection.
      AGENT_NAME: ${{ inputs.agent_name }}
      MAX_ISSUES_INPUT: ${{ inputs.max_issues }}
      ALLOW_CONTINUOUS: ${{ inputs.allow_continuous }}
      TARGET_ISSUE: auto-find
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              corepack enable && pnpm install --no-frozen-lockfile
            elif [ -f yarn.lock ]; then
              corepack enable && yarn install --frozen-lockfile
            else
              npm ci
            fi
          fi

      - name: Normalize inputs
        run: |
          set -euo pipefail
          MAX_ISSUES="${MAX_ISSUES_INPUT:-1}"
          # Enforce numeric and sane bounds.
          if ! [[ "$MAX_ISSUES" =~ ^[0-9]+$ ]]; then
            echo "::warning::max_issues not numeric, defaulting to 1"
            MAX_ISSUES=1
          fi
          if [ "$MAX_ISSUES" -gt 10 ] && [ "$ALLOW_CONTINUOUS" != "true" ]; then
            echo "::warning::max_issues capped at 10 without allow_continuous"
            MAX_ISSUES=10
          fi
          echo "MAX_ISSUES=$MAX_ISSUES" >> "$GITHUB_ENV"

      - name: Configure Git for agent
        run: |
          git config --global user.name "${AGENT_NAME^} Agent"
          git config --global user.email "${AGENT_NAME}@sovereign-agents.local"

      - name: Verify prerequisites
        run: |
          set -euo pipefail
          echo "🔍 Verifying prerequisites..."
          if [ ! -f "AGENTS/${AGENT_NAME^^}_AUTONOMOUS_INSTRUCTIONS.md" ]; then
            echo "❌ No instructions found for agent: $AGENT_NAME"
            exit 1
          fi
          LABELS_MISSING=()
          for label in "priority:critical" "priority:high" "priority:medium" "priority:low" "status:pr-created"; do
            if ! gh label list --json name --jq '.[].name' | grep -q "^$label$"; then
              LABELS_MISSING+=("$label")
            fi
          done
          if [ ${#LABELS_MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required labels: ${LABELS_MISSING[*]}"
            exit 1
          fi
          echo "✅ Prerequisites verified"

      - name: Initialize workspace
        run: |
          set -euo pipefail
          mkdir -p .agent-workspace
          echo "$AGENT_NAME" > .agent-workspace/current-agent
          echo "0" > .agent-workspace/issues-processed
          echo "$(date -Iseconds)" > .agent-workspace/session-start

      - name: Autonomous execution loop
        run: |
          set -euo pipefail
          ISSUES_PROCESSED=0

          while [ "$ISSUES_PROCESSED" -lt "$MAX_ISSUES" ] || [ "$MAX_ISSUES" -eq 0 ]; do
            echo "🔍 Loop iteration $((ISSUES_PROCESSED + 1))"
            if [ -f ".agent-workspace/STOP" ]; then
              echo "🛑 Emergency stop requested."
              break
            fi

            NEXT_ISSUE=""
            for prio in critical high medium; do
              NEXT_ISSUE=$(gh issue list --state open --label "priority:$prio" --limit 1 --json number,body --jq '
                .[] | select(.body | contains("## Acceptance Criteria")) | .number' || echo "")
              [ -n "$NEXT_ISSUE" ] && break
            done

            if [ -z "$NEXT_ISSUE" ] || [ "$NEXT_ISSUE" == "null" ]; then
              echo "✅ No eligible issues found."
              break
            fi

            echo "🎯 Processing issue #$NEXT_ISSUE"
            ISSUE_TITLE=$(gh issue view "$NEXT_ISSUE" --json title --jq '.title' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g' | cut -c1-30)
            BRANCH="agent/$AGENT_NAME/$NEXT_ISSUE-$ISSUE_TITLE"
            if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
              BRANCH="$BRANCH-$(date +%s)"
            fi
            git checkout -b "$BRANCH"

            {
              echo "# Issue #$NEXT_ISSUE Implementation"
              echo ""
              echo "**Agent:** $AGENT_NAME"
              echo "**Branch:** $BRANCH"
              echo ""
              echo "Automated handoff for issue #$NEXT_ISSUE. Ready for human review."
            } > "IMPLEMENTATION_$NEXT_ISSUE.md"

            git add .
            git commit -m "feat(agent): implement issue #$NEXT_ISSUE

          Automated implementation by $AGENT_NAME agent.

          Closes #$NEXT_ISSUE"
            git push -u origin "$BRANCH"

            PR_BODY=$(cat <<'EOF'
          ## Summary
          Automated implementation by the autonomous agent.

          ### Agent Handoff Protocol
          @claude-code: Agent handoff complete. Please review and approve for merge.

          ### Review Checklist
          - [ ] Implementation addresses acceptance criteria
          - [ ] No security vulnerabilities introduced
          - [ ] Documentation updated appropriately
          EOF
          )
            PR_BODY="$PR_BODY

          Closes #$NEXT_ISSUE"
            gh pr create --title "feat(agent): implement issue #$NEXT_ISSUE" --body "$PR_BODY" --base main --head "$BRANCH" --label "agent:handoff" || true

            ISSUES_PROCESSED=$((ISSUES_PROCESSED + 1))
            echo "$ISSUES_PROCESSED" > .agent-workspace/issues-processed
            gh issue edit "$NEXT_ISSUE" --add-label "status:pr-created" || true
            git checkout main
            sleep 5
          done

          echo "🎉 Session complete. Processed $ISSUES_PROCESSED issue(s)."

      - name: Session summary
        if: always()
        run: |
          ISSUES_PROCESSED=$(cat .agent-workspace/issues-processed 2>/dev/null || echo "0")
          {
            echo "## Autonomous Agent Session Summary"
            echo ""
            echo "- **Agent:** $AGENT_NAME"
            echo "- **Issues processed:** $ISSUES_PROCESSED"
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Run:** ${{ github.run_id }}"
            echo ""
            echo "All created PRs require human review before merge."
          } >> "$GITHUB_STEP_SUMMARY"
